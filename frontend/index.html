<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Feedback con IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light text-dark">

    <div class="container py-5" style="max-width: 1140px;">
        <header class="pb-3 mb-5 border-bottom">
            <div class="d-flex align-items-center">
                <i class="bi bi-cpu-fill text-primary fs-1 me-3"></i>
                <div>
                    <h1 class="h2 mb-0 fw-bold text-primary">Dashboard de Feedback con IA</h1>
                    <p class="text-muted mb-0">Enfoque Machine Learning: FastAPI + Supabase + Gemini AI</p>
                </div>
            </div>
        </header>

        <div class="row g-4">
            
            <div class="col-12 col-md-4">
                <div class="card shadow-sm border-0 rounded-4 p-4 mb-4 bg-white">
                    <h2 class="h5 fw-bold mb-3 text-secondary">Analizar Reseña Individual</h2>
                    <div class="mb-3">
                        <textarea id="text-input" rows="4" class="form-control rounded-3" placeholder="Escribe la opinión del cliente aquí..."></textarea>
                    </div>
                    <button id="btn-analyze-text" class="btn btn-primary w-100 fw-medium rounded-3 py-2">
                        <i class="bi bi-stars me-2"></i>Analizar con IA
                    </button>
                    <div id="quick-result" class="mt-3 d-none alert rounded-3 small" role="alert"></div>
                </div>

                <div class="card shadow-sm border-0 rounded-4 p-4 bg-white opacity-75">
                    <h2 class="h5 fw-bold mb-1 text-secondary">Carga Masiva (CSV)</h2>
                    <p class="text-muted small mb-3">Procesamiento de datos en lote (Batch)</p>
                    <div class="border border-2 border-dashed border-secondary-subtle rounded-3 p-4 text-center text-muted small">
                        <i class="bi bi-file-earmark-arrow-up fs-3 d-block text-secondary mb-2"></i>
                        <input type="file" id="csv-input" accept=".csv" class="form-control" />
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-8">
                <div class="row g-3 mb-4">
                    <div class="col-4">
                        <div class="card shadow-sm border-0 rounded-3 text-center p-3 bg-white">
                            <p class="text-muted small fw-medium mb-1">Total Reseñas</p>
                            <p id="stat-total" class="h3 fw-bold text-dark mb-0">0</p>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="card shadow-sm border-0 rounded-3 text-center p-3 bg-white">
                            <p class="text-success small fw-medium mb-1">Positivas</p>
                            <p id="stat-pos" class="h3 fw-bold text-success mb-0">0</p>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="card shadow-sm border-0 rounded-3 text-center p-3 bg-white">
                            <p class="text-danger small fw-medium mb-1">Negativas</p>
                            <p id="stat-neg" class="h3 fw-bold text-danger mb-0">0</p>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-12 col-sm-6">
                        <div class="card shadow-sm border-0 rounded-4 p-4 bg-white d-flex flex-column align-items-center">
                            <h3 class="h6 fw-bold text-muted align-self-start mb-4">Distribución de Sentimientos</h3>
                            <div style="width: 200px; height: 200px;">
                                <canvas id="chart-sentiment"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-12 col-sm-6">
                        <div class="card shadow-sm border-0 rounded-4 p-4 bg-white d-flex flex-column align-items-center">
                            <h3 class="h6 fw-bold text-muted align-self-start mb-4">Categorías Detectadas</h3>
                            <div style="width: 200px; height: 200px;">
                                <canvas id="chart-category"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
